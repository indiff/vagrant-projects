# ==============================================================================
# Oracle Data Guard — Oracle Database 19c (19.3.0) on Oracle Linux 7
# ==============================================================================
#
# This file drives the Vagrantfile. Uncomment the block for the provider you
# intend to use (virtualbox OR libvirt) and comment the other out.
#
# IMPORTANT:
#   * Default passwords are DEMO ONLY. Replace them before any real use.
#   * Never commit a vagrant.yml that contains real credentials.
#
# ------------------------------------------------------------------------------

## -------------------------------- VirtualBox ----------------------------------
host1:
  vm_name:    primary
  mem_size:   8192          # MB — minimum 6144
  cpus:       2
  public_ip:  192.168.56.131
  private_ip: 192.168.200.131
  u01_disk:   ./primary_u01.vdi

host2:
  vm_name:    standby
  mem_size:   8192
  cpus:       2
  public_ip:  192.168.56.132
  private_ip: 192.168.200.132
  u01_disk:   ./standby_u01.vdi

env:
  provider:          virtualbox
  prefix_name:       dg19-ol7
  domain:            localdomain

  # Oradata disks
  non_rotational:    'on'
  oradata_disk_path: ''           # empty = project directory
  oradata_disk_num:  2
  oradata_disk_size: 20           # GB per disk

  # Oracle Database 19c (19.3.0) base installer — Enterprise Edition.
  # Download from: https://www.oracle.com/database/technologies/oracle19c-linux-downloads.html
  # Minimum RU: 19.3 works on OL7 out of the box.
  db_software:       LINUX.X64_193000_db_home.zip

  # Credentials — CHANGE THESE BEFORE REAL USE.
  root_password:     welcome1
  oracle_password:   welcome1
  sys_password:      welcome1
  pdb_password:      welcome1

  ora_languages:     en,en_GB

  db_name:           DB19H1
  pdb_name:          PDB1
  cdb:               true
  adg:               true        # Active Data Guard (open R/O + apply)

