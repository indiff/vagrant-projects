# ==============================================================================
# Oracle Data Guard — Oracle Database 23ai (23.26.1) on Oracle Linux 9
# ==============================================================================
#
# This file drives the Vagrantfile. Uncomment the block for the provider you
# intend to use (virtualbox OR libvirt) and comment the other out.
#
# IMPORTANT:
#   * Default passwords are DEMO ONLY. Replace them before any real use.
#   * Never commit a vagrant.yml that contains real credentials.
#   * 23ai **Free Edition** does NOT support Data Guard — this project targets
#     the Enterprise Edition installer (LINUX.X64_2326100_db_home.zip).
#
# ------------------------------------------------------------------------------

# -------------------------------- VirtualBox ----------------------------------
host1:
  vm_name:    primary
  mem_size:   8192          # MB — minimum 6144
  cpus:       2
  public_ip:  192.168.56.151
  private_ip: 192.168.200.151
  u01_disk:   ./primary_u01.vdi

host2:
  vm_name:    standby
  mem_size:   8192
  cpus:       2
  public_ip:  192.168.56.152
  private_ip: 192.168.200.152
  u01_disk:   ./standby_u01.vdi

env:
  provider:          virtualbox
  prefix_name:       dg26-ol9
  domain:            localdomain

  # Oradata disks
  non_rotational:    'on'
  oradata_disk_path: ''           # empty = project directory
  oradata_disk_num:  2
  oradata_disk_size: 20           # GB per disk

  # Oracle Database 23ai (23.26.1) Enterprise Edition base installer.
  # Download from: https://www.oracle.com/database/technologies/oracle-database-software-downloads.html
  db_software:       LINUX.X64_2326100_db_home.zip

  # Credentials — CHANGE THESE BEFORE REAL USE.
  root_password:     welcome1
  oracle_password:   welcome1
  sys_password:      welcome1
  pdb_password:      welcome1

  ora_languages:     en,en_GB

  db_name:           DB23H1
  pdb_name:          PDB1
  cdb:               true
  adg:               true        # Active Data Guard (open R/O + apply)

